name: Deadline Notification

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:

jobs:
  check-deadlines:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check GitHub Projects for Upcoming Deadlines
        uses: actions/github-script@v7
        id: check_deadlines
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const threeDaysFromNow = new Date();
            threeDaysFromNow.setDate(threeDaysFromNow.getDate() + 7);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            threeDaysFromNow.setHours(23, 59, 59, 999);
            
            const upcomingDeadlines = [];
            const projectNames = ['Progress_Reports', 'Work Logs'];
            
            // Query for projects
            const query = `
              query($owner:String!, $repo:String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 20) {
                    nodes {
                      id
                      title
                      items(first: 100) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              id
                              title
                              url
                            }
                            ... on PullRequest {
                              id
                              title
                              url
                            }
                          }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldDateValue {
                                field {
                                  ... on ProjectV2Field {
                                    name
                                  }
                                }
                                date
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const variables = {
              owner: context.repo.owner,
              repo: context.repo.repo
            };
            
            try {
              const result = await github.graphql(query, variables);
              
              for (const project of result.repository.projectsV2.nodes) {
                if (projectNames.includes(project.title)) {
                  console.log(`Checking project: ${project.title}`);
                  
                  for (const item of project.items.nodes) {
                    if (!item.content) continue;
                    
                    // Find the Deadline field value
                    const deadlineField = item.fieldValues.nodes.find(fv => 
                      fv.field && fv.field.name === 'Deadline'
                    );
                    
                    if (deadlineField && deadlineField.date) {
                      const dueDate = new Date(deadlineField.date);
                      
                      if (dueDate >= today && dueDate <= threeDaysFromNow) {
                        upcomingDeadlines.push({
                          title: item.content.title,
                          url: item.content.url,
                          dueDate: dueDate.toLocaleDateString(),
                          project: project.title
                        });
                      }
                    }
                  }
                }
              }
              
              // Store deadlines for email step
              core.setOutput('has_deadlines', upcomingDeadlines.length > 0);
              core.setOutput('deadlines_json', JSON.stringify(upcomingDeadlines));
              
              // Create notification issue if deadlines found
              if (upcomingDeadlines.length > 0) {
                const body = upcomingDeadlines
                  .map(d => `- [${d.title}](${d.url}) (Due: ${d.dueDate}) - Project: ${d.project}`)
                  .join('\n');
                
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `⏰ Upcoming Deadlines - ${new Date().toLocaleDateString()}`,
                  body: `The following items have deadlines within the next 7 days:\n\n${body}`,
                  labels: ['deadline-alert']
                });
                
                console.log(`Created notification issue for ${upcomingDeadlines.length} upcoming deadlines`);
              } else {
                console.log('No upcoming deadlines found');
              }
            } catch (error) {
              console.error('Error checking deadlines:', error);
              throw error;
            }

      - name: Send Email Notification
        if: steps.check_deadlines.outputs.has_deadlines == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⏰ Upcoming Deadlines - ${{ github.event.repository.name }}"
          to: brendancollins246@gmail.com
          from: ${{ secrets.MAIL_FROM }}
          body: |
            Hello Brendan,

            You have upcoming deadlines in your GitHub Projects!

            Deadlines: ${{ steps.check_deadlines.outputs.deadlines_json }}

            Please log in to your repository to view more details.

            Best regards,
            GitHub Actions Bot